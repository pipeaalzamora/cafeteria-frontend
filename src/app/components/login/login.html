<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <img src="img/Logo.png" alt="Logo Café Ejemplo">
            <h1>Panel de Administración</h1>
            <p>Café Ejemplo</p>
        </div>

        <form class="login-form" (ngSubmit)="onLogin()">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" [(ngModel)]="credentials.username" name="username" placeholder="admin"
                    required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" [(ngModel)]="credentials.password" name="password"
                    placeholder="••••••••" required>
            </div>

            <div class="error-message" *ngIf="errorMessage">
                {{ errorMessage }}
            </div>

            <button type="submit" class="btn-login" [disabled]="isLoading">
                {{ isLoading ? 'Ingresando...' : 'Ingresar' }}
            </button>
        </form>

        <div class="login-footer">
            <p>Credenciales de prueba:</p>
            <p><strong>Usuario:</strong> admin | <strong>Contraseña:</strong> admin123</p>
        </div>
    </div>
</div>
